services:
  - type: web
    name: tommax-portfolio
    env: node
    plan: free
    # If your Render service already exists, you can either:
    # 1) Update it in the dashboard to match these commands, OR
    # 2) Create a new service from this blueprint.
    buildCommand: cd portfolio && npm ci && npm run build
    startCommand: cd portfolio && npm run start
    autoDeploy: true
